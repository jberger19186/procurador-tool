[pytest]
asyncio_mode = auto
timeout = 30

markers =
    api:       Tests de API REST (módulos 1–7, 12, 13)
    web:       Tests de portales web con Playwright (módulos 8–9)
    electron:  Tests de app Electron con Playwright (módulo 10)
    slow:      Tests lentos o de integración E2E
    skip_ci:   Tests que requieren sesión PJN activa o hardware real

addopts =
    --tb=short
    --strict-markers
    -v

# Archivos de reporte HTML (generado con pytest-html)
# Ejecutar con: pytest --html=reports/report.html --self-contained-html
