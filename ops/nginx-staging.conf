# staging-api.procuradortool.com — entorno de STAGING (proxy a localhost:3444)
#
# Espeja la config de api.procuradortool.com pero apunta al proceso staging.
# Este archivo es la referencia versionada. En el servidor vive en:
#   /etc/nginx/sites-available/staging-procurador
#
# SECUENCIA DE ACTIVACIÓN (requiere DNS ya resolviendo):
#   1. (USUARIO) Crear registro DNS A: staging-api.procuradortool.com → 142.93.64.94
#      En Cloudflare: tipo A, nombre "staging-api", contenido 142.93.64.94,
#      Proxy status = "DNS only" (nube gris) — igual que api.
#   2. ln -s /etc/nginx/sites-available/staging-procurador /etc/nginx/sites-enabled/
#   3. nginx -t   (debe pasar)
#   4. certbot --nginx -d staging-api.procuradortool.com   (emite el cert + agrega bloque HTTPS)
#   5. Agregar auth_basic (ver más abajo) a AMBOS bloques tras certbot
#   6. nginx -t && systemctl reload nginx
#   7. Verificar: https://staging-api.procuradortool.com (pide usuario/contraseña)
#
# NOTA sobre auth_basic: se agrega DESPUÉS de certbot para no bloquear el
#   challenge ACME (/.well-known/acme-challenge/). Tras emitir el cert:
#     auth_basic           "Staging - acceso restringido";
#     auth_basic_user_file /etc/nginx/.htpasswd-staging;
#   dentro del server { } de HTTPS (puerto 443).

server {
    listen 80;
    server_name staging-api.procuradortool.com;

    access_log /var/log/nginx/staging-access.log;
    error_log  /var/log/nginx/staging-error.log;
    client_max_body_size 20M;

    location / {
        proxy_pass         https://localhost:3444;
        proxy_ssl_verify   off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;
        proxy_send_timeout    300s;
    }
}
