<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Definiciones: gradiente dorado -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- Base triangular -->
  <polygon points="50,88 38,96 62,96" fill="url(#gold)" rx="1"/>
  <!-- Fuste / columna vertical -->
  <rect x="48" y="22" width="4" height="68" rx="2" fill="url(#gold)"/>
  <!-- Capitel / esfera superior -->
  <circle cx="50" cy="20" r="4" fill="url(#gold)"/>

  <!-- Viga horizontal -->
  <rect x="14" y="18" width="72" height="4" rx="2" fill="url(#goldH)"/>

  <!-- Brazo izquierdo — hilo -->
  <line x1="20" y1="22" x2="20" y2="42" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Platillo izquierdo -->
  <ellipse cx="20" cy="46" rx="12" ry="3.5" fill="url(#goldH)"/>
  <path d="M8 42 Q20 50 32 42" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Brazo derecho — hilo -->
  <line x1="80" y1="22" x2="80" y2="42" stroke="#d97706" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Platillo derecho -->
  <ellipse cx="80" cy="46" rx="12" ry="3.5" fill="url(#goldH)"/>
  <path d="M68 42 Q80 50 92 42" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
