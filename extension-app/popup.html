<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>PJN – Automatización</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      width: 380px;
      padding: 18px 20px 28px;
      color: #1a1a1a;
    }

    /* ── Header ── */
    .header {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #111;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #1a73e8;
      border-radius: 50%;
    }

    /* ── Vista login ── */
    #view-login { display: none; }
    #view-login.active { display: block; }
    #view-main  { display: none; }
    #view-main.active  { display: block; }

    /* ── Loading ── */
    #view-loading { display: none; }
    #view-loading.active {
      display: block;
      text-align: center;
      padding: 24px 0;
      color: #666;
      font-size: 12px;
    }

    /* ── Login form ── */
    .login-title {
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 14px;
    }
    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }
    .field-wrap { margin-bottom: 10px; }

    .user-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      margin-bottom: 12px;
      padding: 5px 8px;
      background: #f3f6fb;
      border-radius: 6px;
    }
    .user-info strong { color: #333; }
    .btn-logout {
      font-size: 10.5px;
      color: #999;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }
    .btn-logout:hover { color: #c00; }

    /* ── Plan badge ── */
    .plan-badge {
      display: inline-block;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 10px;
      background: #e8f0fd;
      color: #1a56d6;
    }
    .plan-badge.PRO        { background: #fef3c7; color: #b45309; }
    .plan-badge.ENTERPRISE { background: #d1fae5; color: #065f46; }

    /* ── Flow selector ── */
    .flow-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .flow-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin-bottom: 5px;
    }
    .flow-grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      margin-bottom: 14px;
    }

    .flow-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 7px 4px 6px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      background: #f8f9fb;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    .flow-btn:hover:not(.locked) {
      border-color: #aab4c8;
      background: #f0f3f8;
    }
    .flow-btn.active {
      border-color: #1a73e8;
      background: #e8f0fd;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
    }
    /* Flujo bloqueado por plan */
    .flow-btn.locked {
      opacity: 0.5;
      cursor: not-allowed;
      border-style: dashed;
      background: #fafafa;
    }
    .flow-btn .flow-icon {
      font-size: 18px;
      line-height: 1;
    }
    .flow-btn.locked .flow-icon {
      filter: grayscale(1);
    }
    .flow-btn .flow-name {
      font-size: 10.5px;
      font-weight: 600;
      color: #444;
      text-align: center;
      line-height: 1.2;
    }
    .flow-btn.active .flow-name { color: #1a73e8; }
    .flow-btn.locked .flow-name { color: #aaa; }

    /* Badge del plan requerido en flujos bloqueados */
    .flow-btn .flow-lock {
      position: absolute;
      top: 3px;
      right: 4px;
      font-size: 8px;
      font-weight: 700;
      color: #b45309;
      letter-spacing: 0.02em;
      line-height: 1;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #e8eaed;
      margin-bottom: 13px;
    }

    /* ── Prompt text ── */
    .prompt {
      font-size: 13px;
      color: #b45309;
      font-weight: 500;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    /* ── Input ── */
    .input-wrap { margin-bottom: 5px; }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1.5px solid #cdd1d8;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
      color: #111;
    }
    input:focus { border-color: #1a73e8; }
    input::placeholder { color: #aaa; }

    /* ── Remember checkbox ── */
    .remember-row { margin-bottom: 4px; }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: #555;
      cursor: pointer;
      user-select: none;
    }
    .remember-label input[type="checkbox"] {
      width: 13px;
      height: 13px;
      cursor: pointer;
      accent-color: #1a73e8;
    }

    /* ── Saved users selector ── */
    #saved-users-panel { margin-bottom: 10px; }
    .saved-users-label {
      font-size: 10px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 5px;
    }
    .saved-user-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border: 1px solid #dde1e7;
      border-radius: 7px;
      background: #f8f9fb;
      cursor: pointer;
      margin-bottom: 5px;
      transition: border-color .15s, background .15s;
    }
    .saved-user-item:hover { border-color: #1a73e8; background: #e8f0fd; }
    .saved-user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .saved-user-email {
      font-size: 12px;
      font-weight: 500;
      color: #222;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .saved-user-remove {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #bbb;
      padding: 0 2px;
      line-height: 1;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .saved-user-remove:hover { color: #c62828; background: #fef2f2; }
    #btn-use-other {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: #1a73e8;
      padding: 2px 0;
      font-weight: 500;
    }
    #btn-use-other:hover { text-decoration: underline; }

    /* ── Links del login ── */
    .login-links {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      margin-bottom: 4px;
    }
    .login-links a {
      font-size: 11px;
      color: #1a73e8;
      text-decoration: none;
      cursor: pointer;
    }
    .login-links a:hover { text-decoration: underline; }

    /* ── Messages ── */
    .msg {
      font-size: 11.5px;
      min-height: 15px;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .msg.err { color: #c62828; }
    .msg.ok  { color: #2e7d32; }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    button {
      padding: 7px 22px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #btn-cancel, #btn-login-cancel {
      background: #dbeafe;
      color: #1e40af;
    }
    #btn-cancel:hover, #btn-login-cancel:hover { background: #bfdbfe; }
    #btn-ok, #btn-login-submit {
      background: #1a73e8;
      color: #fff;
    }
    #btn-ok:hover, #btn-login-submit:hover { background: #1558b0; }
    #btn-ok:disabled, #btn-login-submit:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* ── Banner de actualización ── */
    #update-banner {
      display: none;
      align-items: flex-start;
      gap: 8px;
      background: #fef3c7;
      border: 1.5px solid #f59e0b;
      border-radius: 8px;
      padding: 9px 11px;
      margin-bottom: 12px;
      font-size: 11.5px;
      line-height: 1.45;
      color: #78350f;
    }
    #update-banner.visible { display: flex; }
    #update-banner .upd-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    #update-banner a {
      color: #b45309;
      font-weight: 600;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">PJN &ndash; Automatización <span id="ext-version" style="font-size:9.5px;font-weight:400;color:#aaa;margin-left:4px"></span></div>

  <!-- ── Vista: cargando ───────────────────────────────── -->
  <div id="view-loading">Verificando sesión…</div>

  <!-- ── Vista: login ──────────────────────────────────── -->
  <div id="view-login">
    <div class="login-title">Iniciar sesión en Procurador SCW</div>

    <!-- Selector de cuentas guardadas (visible cuando hay >1) -->
    <div id="saved-users-panel" style="display:none">
      <div class="saved-users-label">Cuentas guardadas</div>
      <div id="saved-users-list"></div>
      <button id="btn-use-other">+ Usar otra cuenta</button>
    </div>

    <div class="field-wrap">
      <div class="field-label">Email</div>
      <input id="login-email" type="email" placeholder="usuario@firma.com" autocomplete="email" />
    </div>
    <div class="field-wrap">
      <div class="field-label">Contraseña</div>
      <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <div class="field-wrap remember-row">
      <label class="remember-label">
        <input type="checkbox" id="chk-remember" />
        Recordar credenciales
      </label>
    </div>

    <div class="msg" id="login-msg"></div>

    <div class="btn-row">
      <button id="btn-login-cancel">Cancelar</button>
      <button id="btn-login-submit">Ingresar</button>
    </div>

    <div class="login-links">
      <a id="link-forgot">¿Olvidaste tu contraseña?</a>
      <a id="link-register">Crear cuenta</a>
    </div>
  </div>

  <!-- ── Banner de actualización disponible ───────────── -->
  <div id="update-banner">
    <span class="upd-icon">⬆️</span>
    <div style="flex:1">
      <strong>Nueva versión disponible</strong><br>
      <span id="upd-msg" style="font-size:11px"></span>
      <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
        <button id="upd-btn-download" style="font-size:11px;padding:4px 10px;border-radius:12px;border:none;background:#f59e0b;color:#fff;font-weight:600;cursor:pointer">⬇ Descargar ZIP</button>
        <button id="upd-btn-electron" style="font-size:11px;padding:4px 10px;border-radius:12px;border:1.5px solid #f59e0b;background:transparent;color:#92400e;font-weight:600;cursor:pointer">Abrir app</button>
      </div>
    </div>
  </div>

  <!-- ── Vista: principal ──────────────────────────────── -->
  <div id="view-main">

    <div class="user-info">
      <span>
        <strong id="user-email-label"></strong>
        &nbsp;·&nbsp;
        <span class="plan-badge" id="plan-badge-label"></span>
      </span>
      <button class="btn-logout" id="btn-logout">Salir</button>
    </div>

    <div class="flow-label">Seleccioná el flujo</div>

    <div class="flow-grid">
      <button class="flow-btn" data-flow="consulta">
        <span class="flow-icon">🔍</span>
        <span class="flow-name">Consulta</span>
      </button>
      <button class="flow-btn" data-flow="escritos1">
        <span class="flow-icon">📄</span>
        <span class="flow-name">Escritos 1</span>
        <span class="flow-lock" data-min-plan="PRO">PRO</span>
      </button>
      <button class="flow-btn" data-flow="escritos2">
        <span class="flow-icon">✍️</span>
        <span class="flow-name">Escritos 2</span>
      </button>
    </div>
    <div class="flow-grid-2">
      <button class="flow-btn" data-flow="notificaciones">
        <span class="flow-icon">🔔</span>
        <span class="flow-name">Notificaciones</span>
        <span class="flow-lock" data-min-plan="ENTERPRISE">ENT</span>
      </button>
      <button class="flow-btn" data-flow="deox">
        <span class="flow-icon">📬</span>
        <span class="flow-name">DEOX</span>
        <span class="flow-lock" data-min-plan="ENTERPRISE">ENT</span>
      </button>
    </div>

    <div class="divider"></div>

    <div class="prompt" id="prompt-text">
      Ingrese el expediente (SIGLA NNNNN/AAAA). Ej.: FCR 18745/2017
    </div>

    <div class="input-wrap">
      <input id="exp" type="text" placeholder="Ej.: FCR 18745/2017" autofocus />
    </div>

    <div class="msg" id="msg"></div>

    <div class="btn-row">
      <button id="btn-cancel">Cancelar</button>
      <button id="btn-ok">Aceptar</button>
    </div>

  </div><!-- /view-main -->

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
