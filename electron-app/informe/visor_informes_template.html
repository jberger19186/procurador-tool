<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor de Informes — Procurador SCW</title>
<style>
  :root {
    --bg-base:       #f7f7f5;
    --bg-surface:    #ffffff;
    --bg-elevated:   #fafaf9;
    --bg-hover:      #f0f0ee;
    --border:        rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.13);
    --accent:        #d97706;
    --accent-dark:   #b45309;
    --accent-muted:  rgba(217,119,6,0.10);
    --accent-glow:   rgba(217,119,6,0.18);
    --text-1: #1a1a1a;
    --text-2: #5c5c5c;
    --text-3: #a8a8a8;
    --success:    #059669;
    --success-bg: rgba(5,150,105,0.09);
    --error:      #dc2626;
    --error-bg:   rgba(220,38,38,0.09);
    --warning:    #d97706;
    --warning-bg: rgba(217,119,6,0.09);
    --font:      "Inter","Segoe UI",system-ui,sans-serif;
    --font-mono: "Cascadia Code","Consolas",monospace;
    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg-base);
    color: var(--text-1);
    font-size: 13px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .ob-header {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 22px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .logo-mark {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), #f59e0b);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
    box-shadow: 0 2px 8px var(--accent-glow);
  }
  .header-title { font-size: 14px; font-weight: 700; color: var(--text-1); letter-spacing: -0.01em; }
  .header-meta  { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .header-spacer { flex: 1; }
  .btn {
    height: 30px; padding: 0 13px;
    border-radius: var(--radius-sm); border: none;
    font-size: 12px; font-family: var(--font); font-weight: 500;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.13s; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 6px var(--accent-glow); }
  .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border-strong); }
  .btn-ghost:hover { background: var(--bg-hover); color: var(--text-1); }

  /* ── Stats ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 10px; padding: 14px 22px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--bg-base); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    display: flex; align-items: center; gap: 12px; transition: 0.13s;
  }
  .stat-card:hover { border-color: var(--border-strong); }
  .stat-icon {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .stat-val   { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-3); margin-top: 3px; font-weight: 500; }

  /* ── Toolbar ── */
  .table-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 22px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    display: flex; align-items: center; gap: 7px;
    background: var(--bg-base); border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); padding: 0 11px; height: 30px; width: 280px;
    transition: 0.13s;
  }
  .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-muted); background: #fff; }
  .search-box svg { color: var(--text-3); flex-shrink: 0; }
  .search-box input { background: transparent; border: none; color: var(--text-1); font-family: var(--font); font-size: 12.5px; flex: 1; outline: none; }
  .search-box input::placeholder { color: var(--text-3); }

  .filter-chip {
    height: 28px; padding: 0 11px; border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: transparent; color: var(--text-2);
    font-size: 11.5px; font-family: var(--font);
    cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.12s;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent-dark); }
  .filter-chip.active { background: var(--accent-muted); border-color: var(--accent); color: var(--accent-dark); font-weight: 600; }
  .filter-dot { width: 6px; height: 6px; border-radius: 50%; }
  .toolbar-spacer { flex: 1; }
  .result-count { font-size: 11.5px; color: var(--text-3); }

  /* ── Table ── */
  .table-wrapper { padding: 0 22px 24px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 14px; }
  thead th {
    text-align: left; font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text-3); padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap; background: var(--bg-base);
  }
  thead th.center { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--bg-hover); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.hidden { display: none; }
  td { padding: 9px 12px; font-size: 12.5px; color: var(--text-2); }
  td.center { text-align: center; }
  td.mono { font-family: var(--font-mono); font-size: 12px; color: var(--accent-dark); font-weight: 600; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge-ok  { background: var(--success-bg); color: var(--success); }
  .badge-err { background: var(--error-bg);   color: var(--error); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .btn-pdf {
    display: inline-flex; align-items: center; gap: 5px;
    height: 26px; padding: 0 11px;
    border-radius: var(--radius-sm); border: 1px solid var(--border-strong);
    font-size: 11px; font-family: var(--font); font-weight: 500;
    cursor: pointer; background: transparent; color: var(--text-2);
    text-decoration: none; transition: all 0.12s;
  }
  .btn-pdf:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-pdf.disabled { opacity: 0.35; pointer-events: none; cursor: not-allowed; }

  .no-results { text-align: center; padding: 48px; color: var(--text-3); display: none; }
  .no-results.show { display: block; }

  /* ── Footer ── */
  .ob-footer {
    padding: 14px 22px; border-top: 1px solid var(--border);
    background: var(--bg-surface); text-align: center;
    font-size: 12px; color: var(--text-3); margin-top: 8px;
  }
  .ob-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .ob-footer a:hover { text-decoration: underline; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .table-toolbar { flex-wrap: wrap; }
    .search-box { width: 100%; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="ob-header">
  <div class="logo-mark">⚖️</div>
  <div>
    <div class="header-title">Visor de Informes</div>
    <div class="header-meta">Generado el: <span id="fechaEjecucion">--/--/---- --:--</span></div>
  </div>
  <div class="header-spacer"></div>
  <button class="btn btn-primary" id="btnRegenerar">🔄 Regenerar fallidos</button>
</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-icon" style="background:var(--accent-muted)">📋</div>
    <div><div class="stat-val" style="color:var(--accent-dark)" id="statTotal">0</div><div class="stat-label">Total procesados</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:var(--success-bg)">✅</div>
    <div><div class="stat-val" style="color:var(--success)" id="statExitosos">0</div><div class="stat-label">Exitosos</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:var(--error-bg)">⚠️</div>
    <div><div class="stat-val" style="color:var(--error)" id="statFallidos">0</div><div class="stat-label">Fallidos</div></div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="background:var(--success-bg)">📈</div>
    <div><div class="stat-val" style="color:var(--success)" id="statPorcentaje">0%</div><div class="stat-label">Tasa de éxito</div></div>
  </div>
</div>

<!-- Toolbar -->
<div class="table-toolbar">
  <div class="search-box">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10l3 3"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar expediente...">
  </div>
  <button class="filter-chip active" data-filter="todos"><div class="filter-dot" style="background:var(--accent)"></div>Todos</button>
  <button class="filter-chip" data-filter="exitosos"><div class="filter-dot" style="background:var(--success)"></div>Exitosos</button>
  <button class="filter-chip" data-filter="fallidos"><div class="filter-dot" style="background:var(--error)"></div>Fallidos</button>
  <div class="toolbar-spacer"></div>
  <span class="result-count" id="result-count"></span>
</div>

<!-- Table -->
<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th style="width:5%">N°</th>
        <th>Expediente</th>
        <th class="center" style="width:14%">Estado</th>
        <th class="center" style="width:10%">Código</th>
        <th class="center" style="width:10%">PDF</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-results" id="noResults">No se encontraron resultados</div>
</div>

<!-- Footer -->
<div class="ob-footer">
  Procurador SCW &nbsp;·&nbsp; <a href="#" id="linkExcel">📊 Descargar Excel</a>
</div>

<script>
  // DATOS INYECTADOS (reemplazados por generador_visor.js)
  const DATOS_BATCH = {
    fechaEjecucion: '2025-12-02 03:00:00',
    expedientes: [],
    rutaExcel: ''
  };

  document.addEventListener('DOMContentLoaded', () => {
    inicializar();
    setupEventos();
  });

  function inicializar() {
    document.getElementById('fechaEjecucion').textContent = DATOS_BATCH.fechaEjecucion;
    const total    = DATOS_BATCH.expedientes.length;
    const exitosos = DATOS_BATCH.expedientes.filter(e => e.ok).length;
    const fallidos = total - exitosos;
    const porcentaje = total > 0 ? ((exitosos / total) * 100).toFixed(1) : 0;
    document.getElementById('statTotal').textContent     = total;
    document.getElementById('statExitosos').textContent  = exitosos;
    document.getElementById('statFallidos').textContent  = fallidos;
    document.getElementById('statPorcentaje').textContent = porcentaje + '%';

    const btnRegenerar = document.getElementById('btnRegenerar');
    if (fallidos === 0) {
      btnRegenerar.disabled    = true;
      btnRegenerar.textContent = '✅ Sin errores';
    }
    if (DATOS_BATCH.rutaExcel) document.getElementById('linkExcel').href = DATOS_BATCH.rutaExcel;
    renderizarTabla(DATOS_BATCH.expedientes);
  }

  function renderizarTabla(expedientes) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    expedientes.forEach((exp, index) => {
      const tr = document.createElement('tr');
      tr.dataset.expediente = exp.expediente.toLowerCase();
      tr.dataset.estado = exp.ok ? 'ok' : 'error';
      const pdfBtn = exp.ok
        ? `<a href="${exp.rutaPDF || '#'}" class="btn-pdf">📄 Abrir PDF</a>`
        : `<span class="btn-pdf disabled">N/A</span>`;
      tr.innerHTML = `
        <td style="color:var(--text-3)">${index + 1}</td>
        <td class="mono">${exp.expediente}</td>
        <td class="center">
          <span class="status-badge ${exp.ok ? 'badge-ok' : 'badge-err'}">
            <span class="badge-dot"></span>${exp.ok ? 'OK' : 'Error'}
          </span>
        </td>
        <td class="center" style="color:var(--text-3)">${exp.exitCode || 0}</td>
        <td class="center">${pdfBtn}</td>`;
      tbody.appendChild(tr);
    });
    actualizarContador();
  }

  function setupEventos() {
    document.getElementById('searchInput').addEventListener('input', e => filtrarTabla(e.target.value));
    document.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', e => {
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        filtrarPorEstado(e.currentTarget.dataset.filter);
      });
    });
    document.getElementById('btnRegenerar').addEventListener('click', generarTxtFallidos);
  }

  function filtrarTabla(texto) {
    const busqueda = texto.toLowerCase();
    document.querySelectorAll('#tableBody tr').forEach(fila => {
      fila.classList.toggle('hidden', !fila.dataset.expediente.includes(busqueda));
    });
    actualizarContador();
  }

  function filtrarPorEstado(filtro) {
    document.querySelectorAll('#tableBody tr').forEach(fila => {
      const visible = filtro === 'todos' ||
        (filtro === 'exitosos' && fila.dataset.estado === 'ok') ||
        (filtro === 'fallidos' && fila.dataset.estado === 'error');
      fila.classList.toggle('hidden', !visible);
    });
    actualizarContador();
  }

  function actualizarContador() {
    const visibles = document.querySelectorAll('#tableBody tr:not(.hidden)').length;
    document.getElementById('noResults').classList.toggle('show', visibles === 0);
    const rc = document.getElementById('result-count');
    if (rc) rc.textContent = visibles + ' resultado' + (visibles !== 1 ? 's' : '');
  }

  function generarTxtFallidos() {
    const fallidos = DATOS_BATCH.expedientes.filter(e => !e.ok).map(e => e.expediente).join('\n');
    if (!fallidos) { alert('No hay expedientes fallidos para regenerar'); return; }
    const blob = new Blob([fallidos], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `expedientes_fallidos_${Date.now()}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert('✅ Archivo generado. Usalo en el menú Opción 2 para reprocesar.');
  }
</script>
</body>
</html>
